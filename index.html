    <main>
        <h2>Descubra a verdade passando o mouse ou clicando</h2>

                    <img src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/mm1012723121410486.jpg?w=1900&h=2849" alt="Pinguim nadando" class="cartao-imagem">

            </div>

    </main>

    <footer>
